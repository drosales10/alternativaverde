
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alternativa Verde 2023 C.A. - Gestión de Tickets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
      }
      .brand-font {
        font-family: 'Montserrat', sans-serif;
      }
      @media print {
        @page {
          margin: 0.5cm;
          /* Forzar impresión en horizontal (oficio/legal) */
          /* 8.5in x 13in is legal/oficio size; landscape orientation */
          size: 8.5in 13in landscape;
        }
        body {
          background-color: white !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }
        .no-print {
          display: none !important;
        }
        .print-only {
          display: block !important;
        }
        /* Resetea el layout principal para que no interfiera */
        main {
          padding: 0 !important;
          margin: 0 !important;
          overflow: visible !important;
        }
        /* Asegura que los bordes y colores se vean nítidos */
        * {
          print-color-adjust: exact !important;
          -webkit-print-color-adjust: exact !important;
        }
        /* Contenedor y tarjetas para impresión lado-a-lado */
        html, body, #root, main {
          width: 100% !important;
          height: auto !important;
          margin: 0 !important;
          padding: 0 !important;
        }
        .tickets-print-container {
          display: flex !important;
          flex-direction: row !important;
          flex-wrap: nowrap !important;
          justify-content: space-between !important;
          gap: 0 !important;
          width: 100% !important;
          max-width: 100% !important;
          box-sizing: border-box !important;
          padding: 0 !important;
        }
        
        /* Remove outer centering on print to allow full-width layout */
        .mx-auto {
          margin-left: 0 !important;
          margin-right: 0 !important;
        }
      }
    </style>
